name: OmniUI Go WASM Deployment

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  validate-framework:
    name: Validate BobUI Go + CMake compatibility
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-xcb-dev libxcb-xkb-dev libxfixes-dev
        sudo apt-get install -y cmake libwayland-dev libx11-dev libxkbcommon-x11-dev libgles2-mesa-dev libegl1-mesa-dev libffi-dev libxcursor-dev libvulkan-dev

    - name: Validate Go baseline
      run: |
        go test ./internal/...
        go build -buildvcs=false .

    - name: Validate BobUI CMake compatibility surface
      run: |
        cmake -DBOBUI_SKIP_NATIVE_CONFIGURE=ON -P cmake/tests/bobui_full_compatibility_validation.cmake

  build-wasm:
    name: Build Go WebAssembly
    runs-on: ubuntu-latest
    needs: validate-framework

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.22'

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libx11-xcb-dev libxcb-xkb-dev libxfixes-dev
        sudo apt-get install -y libwayland-dev libx11-dev libxkbcommon-x11-dev libgles2-mesa-dev libegl1-mesa-dev libffi-dev libxcursor-dev libvulkan-dev

    - name: Build WASM
      run: |
        GOOS=js GOARCH=wasm go build -o main.wasm main.go

    - name: Upload WASM Artifact
      uses: actions/upload-artifact@v4
      with:
        name: OmniUI-Go-WASM
        path: main.wasm
