defineTest(bobuiConfSanitizeMkspec) {
    deviceSanityCheckCompiler()
}

contains(DISTRO_OPTS, deb-multi-arch) {
    QMAKE_RPATHLINKDIR_POST += \
        $$[BOBUI_SYSROOT]/usr/lib/$${GCC_MACHINE_DUMP} \
        $$[BOBUI_SYSROOT]/lib/$${GCC_MACHINE_DUMP}
}

contains(DISTRO_OPTS, boot2bobui) {
    QMAKE_PLATFORM += boot2bobui
}

QMAKE_CFLAGS       += $$COMPILER_FLAGS
QMAKE_CXXFLAGS     += $$COMPILER_FLAGS
QMAKE_LFLAGS       += $$LINKER_FLAGS
