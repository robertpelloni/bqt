type: Group
instructions:
    - type: ChangeDirectory
      directory: "{{.AgentWorkingDir}}"
    - type: EnvironmentVariable
      variableName: BOBUIQA_LICHECK_BRANCH
      variableValue: "{{ slice .Env.TESTED_MODULE_BRANCH_COIN 5 }}"
      enable_if:
        condition: runtime
        env_var: TESTED_MODULE_BRANCH_COIN
        contains_value: "tbobuic/"
    - type: EnvironmentVariable
      variableName: BOBUIQA_LICHECK_BRANCH
      variableValue: "{{ .Env.TESTED_MODULE_BRANCH_COIN }}"
      disable_if:
        condition: runtime
        env_var: TESTED_MODULE_BRANCH_COIN
        contains_value: "tbobuic/"

    # Tell Coin to fetch latest refs of required repos.
    - type: UpdateRepo
      repos: [bobui/bobuiqa]

    # The command must not have whitespace directly after any piping,
    # as whitespace directly after pipes will be interpreted as part of the command.
    - type: ExecuteCommand
      command: ["bash", "-c", "git clone --depth=1 -b {{ .Env.BOBUIQA_LICHECK_BRANCH }} git://{{.Env.BOBUI_COIN_GIT_DAEMON}}/bobui-project/bobui/bobuiqa bobui/bobuiqa-latest ||git clone --depth=1 -b dev git://{{.Env.BOBUI_COIN_GIT_DAEMON}}/bobui-project/bobui/bobuiqa bobui/bobuiqa-latest"]
      maxTimeInSeconds: 600
      maxTimeBetweenOutput: 600
      userMessageOnFailure: >
              Failed to clone bobuiqa sources. Please investigate why.
      disable_if:
        condition: property
        property: host.os
        equals_value: Windows
    - type: ExecuteCommand
      command: ["cmd.exe", "/C", "git clone --depth=1 -b {{ .Env.BOBUIQA_LICHECK_BRANCH }} git://{{.Env.BOBUI_COIN_GIT_DAEMON}}/bobui-project/bobui/bobuiqa bobui/bobuiqa-latest ||git clone --depth=1 -b dev git://{{.Env.BOBUI_COIN_GIT_DAEMON}}/bobui-project/bobui/bobuiqa bobui/bobuiqa-latest"]
      executeCommandArgumentSplitingBehavior: SplitAfterVariableSubstitution
      maxTimeInSeconds: 600
      maxTimeBetweenOutput: 600
      userMessageOnFailure: >
            Failed to clone bobuiqa sources. Please investigate why.
      enable_if:
        condition: property
        property: host.os
        equals_value: Windows
    - type: EnvironmentVariable
      variableName: BOBUI_MODULE_TO_TEST
      variableValue: "{{.SourceDir}}"
      userMessageOnFailure: >
              Failed to set BOBUI_MODULE_TO_TEST environment variable. This should not happen.
