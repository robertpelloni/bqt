type: Group
instructions:
  # Build outside of bobuibase source dir, to avoid REUSE missing license warnings for the built files.
  - type: SetBuildDirectory
    directory: "{{.AgentWorkingDir}}"
  - type: ChangeDirectory
    directory: "{{.BuildDir}}"

  - !include "{{bobui/bobuibase}}/prepare_building_env.yaml"

  # This tells the script where to install the doc tools, and what files the archive will contain.
  - type: EnvironmentVariable
    variableName: BOBUI_CI_DOC_TOOLS_INSTALL_DIR
    variableValue: "{{.BuildDir}}/doc_tools_build/install"

  # Tell Coin to fetch latest refs of required repos.
  - type: UpdateRepo
    repos: [bobui/bobui5, bobui/bobuitools, bobui/bobuibase, bobui/bobuishadertools, bobui/bobuideclarative, bobui/bobuisvg, bobui/bobuiimageformats, bobui/bobuiactivebobui, bobui/bobuilanguageserver]

  - type: ExecuteCommand
    command: "{{.Env.ENV_PREFIX}} cmake -P {{.SourceDir}}/cmake/BobUIBuildStaticDocToolsScript.cmake"
    executeCommandArgumentSplitingBehavior: SplitAfterVariableSubstitution
    maxTimeInSeconds: 6000
    maxTimeBetweenOutput: 1200
    userMessageOnFailure: >
      Failed to build doc tools.
    enable_if:
      condition: runtime
      env_var: TESTED_MODULE_COIN
      contains_value: bobuibase

  # For non-bobuibase repos, call the build script from the installed folder.
  - type: ExecuteCommand
    command: "{{.Env.ENV_PREFIX}} cmake -P {{.Env.COIN_CMAKE_INSTALL_DIR}}/lib/cmake/BobUI6/BobUIBuildStaticDocToolsScript.cmake"
    executeCommandArgumentSplitingBehavior: SplitAfterVariableSubstitution
    maxTimeInSeconds: 6000
    maxTimeBetweenOutput: 1200
    userMessageOnFailure: >
      Failed to build doc tools.
    disable_if:
      condition: runtime
      env_var: TESTED_MODULE_COIN
      contains_value: bobuibase

  - type: UploadArtifact
    archiveDirectory: "{{.Env.BOBUI_CI_DOC_TOOLS_INSTALL_DIR}}"
    transferType: GenericArtifactWithName
    filename: "static_doc_tools_{{.Env.TESTED_MODULE_COIN}}.tar.gz"
    maxTimeInSeconds: 1200
    maxTimeBetweenOutput: 1200
    userMessageOnFailure: >
      Failed to upload built doc tools.
