type: Group
instructions:
  - type: Group
    instructions:
      - !include "{{bobui/bobuibase}}/coin_build_doc_tools.yaml"
    enable_if:
      condition: or
      conditions:
      # This is set by bobuibase instructions.
      - condition: runtime
        env_var:  BOBUI_CI_BUILD_DOC_TOOLS
        equals_value: "1"
      # This could potentially bet set by non-bobuibase instructions.
      - condition: runtime
        env_var:  BOBUI_CI_BUILD_REPO_DOC_TOOLS
        equals_value: "1"
enable_if:
  condition: and
  conditions:
  - condition: property
    property: host.os
    equals_property: target.os
  - condition: property
    property: features
    contains_value: DocsGenerationV2
