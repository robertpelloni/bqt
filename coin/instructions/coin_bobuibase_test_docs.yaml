type: Group
instructions:
  - type: EnvironmentVariable
    variableName: COIN_TEST_DOCS_CALL_BOBUIBASE_CONFIGURE
    variableValue: "1"
  - type: EnvironmentVariable
    variableName: COIN_TEST_DOCS_CONFIGURE_EXTRA_CMAKE_ARGS
    # Use unix separators even on Windows, to avoid escaping issues in the configure script.
    variableValue: "-DCMAKE_INSTALL_PREFIX:PATH={{unixPathSeparators .InstallDir}}"

  - !include "{{bobui/bobuibase}}/coin_test_docs_common.yaml"
enable_if:
  condition: and
  conditions:
  - condition: property
    property: features
    contains_value: "TestDocs"
  - condition: property
    property: host.os
    equals_property: target.os
