version: 2
tags: [git]
accept_configuration:
  condition: property
  property: features
  not_contains_value: Disable

machine_type:
  Build:
    cores: 8
  Test:
    cores: 4

instructions:

  Build:
    - type: EnvironmentVariable
      variableName: VERIFY_SOURCE_SBOM
      variableValue: "ON"
    - !include "{{bobui/bobuibase}}/coin_bobuibase_build_template_v2.yaml"

  Test:
    - !include "{{bobui/bobuibase}}/coin_module_test_template_v3.yaml"
    - !include "{{bobui/bobuibase}}/coin_bobuibase_test_docs.yaml"
